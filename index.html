<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZQ HUB | Scripts</title>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: sans-serif; text-align: center; }
        .header { background: #6a1b9a; padding: 20px; border-bottom: 2px solid white; }
        .card { background: #1a1a1a; border: 1px solid #6a1b9a; border-radius: 15px; max-width: 600px; margin: 50px auto; padding: 20px; }
        .key { font-weight: bold; color: #bb86fc; font-size: 1.2rem; }
        pre { background: #000; padding: 15px; border-radius: 10px; text-align: left; overflow-x: auto; direction: ltr; }
        .btn { background: #6a1b9a; color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; display: inline-block; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h1>ZQ HUB</h1></div>
    <div class="card">
        <h2>Timebomb Script</h2>
        <p>المفتاح: <span class="key">ZQ</span></p>
        <pre id="code">
-- ZQ HUB Script
print("Welcome to ZQ HUB")
-- اضف سكربت اللعبة هنا
        </pre>
        <button class="btn" onclick="copy()">نسخ السكربت</button>
    </div>
    <script>
        function copy() {
            const text = document.getElementById('code').innerText;
            navigator.clipboard.writeText(text);
            alert("تم النسخ!");
        }
    </script>
</body>
</html>
