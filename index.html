<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZQ HUB | Official Scripts</title>
    <style>
        :root {
            --primary: #6a1b9a;
            --accent: #bb86fc;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --code-bg: #000000;
        }
        body { 
            background-color: var(--bg); 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 0;
        }
        .header { 
            background: var(--primary); 
            padding: 40px; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(106, 27, 154, 0.4);
            border-bottom: 2px solid var(--accent);
        }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        
        /* قسم المطورين */
        .creators-section {
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .name-container { display: inline-block; min-width: 140px; text-align: right; }
        .fade-text { transition: opacity 0.5s ease-in-out; color: var(--accent); }

        /* البحث والاقتراحات */
        .search-wrapper { position: relative; width: 85%; margin: 0 auto 40px auto; }
        #searchInput {
            width: 100%;
            padding: 16px 25px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            background: #1a1a1a;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }
        .suggestions-box {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border: 1px solid var(--primary);
            border-radius: 15px;
            margin-top: 5px;
            display: none;
            z-index: 100;
            overflow: hidden;
        }
        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #333;
            transition: 0.2s;
        }
        .suggestion-item:hover { background: var(--primary); }

        /* السكربتات */
        .script-item { display: none; margin-top: 20px; }
        .card { 
            background: var(--card-bg); 
            border: 1px solid #333; 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }
        .key-box {
            background: #252525;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            border-right: 4px solid var(--accent);
            color: var(--accent);
            font-weight: bold;
        }
        pre { background: var(--code-bg); padding: 15px; border-radius: 10px; overflow-x: auto; direction: ltr; }
        .btn { 
            background: var(--primary); 
            color: white; 
            padding: 10px 25px; 
            border-radius: 10px; 
            border: none;
            cursor: pointer; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ZQ HUB | Scripts</h1>
        <p>ابحث عن السكربت المفضل لديك</p>
    </div>

    <div class="container">
        
        <div class="creators-section">
            <span style="color: #fff;">By:</span>
            <div class="name-container">
                <span id="creator" class="fade-text">qwaw493</span>
            </div>
        </div>

        <!-- نظام البحث الجديد -->
        <div class="search-wrapper">
            <input type="text" id="searchInput" oninput="showSuggestions()" placeholder="اكتب اسم السكربت هنا (مثال: Timebomb)..." autocomplete="off">
            <div id="suggestionsBox" class="suggestions-box"></div>
        </div>

        <div id="scriptsList">
            <!-- Timebomb Script -->
            <div id="script-timebomb" class="card script-item">
                <h2 class="script-name">Timebomb Script</h2>
                <div class="key-box">الـ Key: ZQHUB-TB-9921</div>
                <pre id="code1">loadstring(game:HttpGet("https://pastebin.com/raw/d1Bc8Rax"))()</pre>
                <button class="btn" onclick="copy('code1')">نسخ السكربت</button>
            </div>

            <!-- Aimbot Script -->
            <div id="script-aimbot" class="card script-item">
                <h2 class="script-name">Aimbot Official</h2>
                <div class="key-box">الـ Key: ZQHUB-AIM-FREE</div>
                <pre id="code2">print("Aimbot Loaded!")</pre>
                <button class="btn" onclick="copy('code2')">نسخ السكربت</button>
            </div>
        </div>

    </div>

    <script>
        // تبديل المطورين
        const creators = ["qwaw493", "zennko", "astro_lol4", "s1133bj3"];
        let currentIdx = 0;
        setInterval(() => {
            const el = document.getElementById("creator");
            el.style.opacity = 0;
            setTimeout(() => {
                currentIdx = (currentIdx + 1) % creators.length;
                el.innerText = creators[currentIdx];
                el.style.opacity = 1;
            }, 500);
        }, 3000);

        // قائمة السكربتات المتاحة للبحث
        const availableScripts = [
            { name: "Timebomb Script", id: "script-timebomb" },
            { name: "Aimbot Official", id: "script-aimbot" }
        ];

        function showSuggestions() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const box = document.getElementById('suggestionsBox');
            box.innerHTML = '';

            if (input.trim() === "") {
                box.style.display = 'none';
                return;
            }

            const filtered = availableScripts.filter(s => s.name.toLowerCase().includes(input));

            if (filtered.length > 0) {
                box.style.display = 'block';
                filtered.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerText = s.name;
                    div.onclick = () => selectScript(s.id, s.name);
                    box.appendChild(div);
                });
            } else {
                box.style.display = 'none';
            }
        }

        function selectScript(id, name) {
            // إخفاء كل السكربتات أولاً
            document.querySelectorAll('.script-item').forEach(item => item.style.display = 'none');
            
            // إظهار السكربت المختار فقط
            document.getElementById(id).style.display = 'block';
            
            // تحديث مربع البحث وإخفاء الاقتراحات
            document.getElementById('searchInput').value = name;
            document.getElementById('suggestionsBox').style.display = 'none';
        }

        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("✅ تم النسخ!");
        }
    </script>
</body>
</html>
