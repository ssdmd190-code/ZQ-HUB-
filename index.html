<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZQ HUB | Official Scripts</title>
    <style>
        :root {
            --primary: #6a1b9a;
            --accent: #bb86fc;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body { 
            background-color: var(--bg); 
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }
        .header { 
            background: var(--primary); 
            padding: 40px; 
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            border-bottom: 3px solid var(--accent);
            animation: fadeInDown 0.8s ease;
        }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        
        /* البحث */
        .search-container { margin-bottom: 40px; text-align: center; }
        #searchInput {
            width: 80%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            background: #111;
            color: white;
            font-size: 1.1rem;
            transition: var(--transition);
            box-shadow: 0 0 15px rgba(106, 27, 154, 0.2);
        }
        #searchInput:focus { width: 90%; box-shadow: 0 0 25px var(--primary); outline: none; }

        /* قائمة السكربتات */
        .scripts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .script-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #333;
            transition: var(--transition);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .script-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(106, 27, 154, 0.4); }
        .script-card img { width: 100%; border-radius: 10px; margin-bottom: 15px; }

        /* النافذة المنبثقة (Modal) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.4s ease;
        }
        .modal-content {
            background: var(--card-bg);
            margin: 5% auto;
            padding: 30px;
            width: 80%;
            max-width: 600px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            position: relative;
            box-shadow: 0 0 50px rgba(106, 27, 154, 0.5);
            transform: scale(0.7);
            animation: zoomIn 0.3s forwards;
        }
        .close-modal { position: absolute; left: 20px; top: 15px; font-size: 30px; cursor: pointer; color: var(--accent); }

        /* الأزرار والسكربت */
        pre { background: #000; padding: 15px; border-radius: 10px; text-align: left; direction: ltr; overflow-x: auto; border: 1px solid #222; }
        .btn { 
            background: var(--primary); color: white; padding: 12px 25px; border: none; 
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: var(--transition);
        }
        .btn:hover { background: var(--accent); transform: scale(1.05); }

        /* قسم الديسكورد */
        .discord-card {
            background: linear-gradient(90deg, #7289da, #5b70b3);
            border-radius: 15px; padding: 25px; display: flex; align-items: center;
            justify-content: space-between; margin-top: 50px; box-shadow: 0 10px 25px rgba(114, 137, 218, 0.3);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.7); } to { transform: scale(1); } }
        @keyframes fadeInDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <!-- ملفات الصوت -->
    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <div class="header">
        <h1>ZQ HUB | Scripts</h1>
        <p>التميز والاحترافية في مكان واحد</p>
    </div>

    <div class="container">
        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="searchScripts()" placeholder="ابحث عن السكربت هنا...">
        </div>

        <div class="scripts-grid" id="scriptsGrid">
            <!-- كرت سكربت تايم بومب -->
            <div class="script-card" onclick="openModal('timebombModal')">
                <img src="https://tr.rbxcdn.com/15f0601614e2469446f04128548903e1/150/150/Image/Jpeg" alt="Timebomb">
                <h3>Timebomb Script</h3>
                <p>اضغط لعرض التفاصيل</p>
            </div>
        </div>

        <!-- مربع الديسكورد -->
        <div class="discord-card">
            <div>
                <h3 style="margin:0;">مجتمع ZQ HUB</h3>
                <p style="margin:5px 0 0 0;">انضم إلينا للحصول على الدعم</p>
            </div>
            <a href="https://discord.gg/guw2ac94E" target="_blank" style="text-decoration:none;">
                <button class="btn" style="background:#fff; color:#7289da;">دخول السيرفر</button>
            </a>
        </div>
    </div>

    <!-- نافذة تايم بومب (المختفية) -->
    <div id="timebombModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('timebombModal')">&times;</span>
            <img src="https://tr.rbxcdn.com/15f0601614e2469446f04128548903e1/150/150/Image/Jpeg" style="width:100px; display:block; margin: 0 auto 15px;">
            <h2 style="text-align:center;">Timebomb Script</h2>
            <p>المفتاح: <span style="color:var(--accent); font-weight:bold;">ZQ</span></p>
            <pre id="tbCode">-- ZQ HUB Timebomb
loadstring(game:HttpGet("https://raw.githubusercontent.com/YourLink"))()</pre>
            <div style="text-align:center; margin-top:20px;">
                <button class="btn" onclick="copyCode('tbCode')">نسخ الكود</button>
            </div>
        </div>
    </div>

    <script>
        const clickSnd = document.getElementById('clickSound');

        // تشغيل صوت عند أي ضغطة في الموقع
        document.addEventListener('click', () => {
            clickSnd.currentTime = 0;
            clickSnd.play();
        });

        function openModal(id) {
            document.getElementById(id).style.display = "block";
        }

        function closeModal(id) {
            document.getElementById(id).style.display = "none";
        }

        function searchScripts() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('script-card');
            for (let card of cards) {
                let name = card.getElementsByTagName('h3')[0].innerText.toLowerCase();
                card.style.display = name.includes(input) ? "block" : "none";
            }
        }

        function copyCode(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("تم النسخ بنجاح!");
        }

        // إغلاق النافذة عند الضغط خارجها
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = "none";
            }
        }
    </script>
</body>
</html>
