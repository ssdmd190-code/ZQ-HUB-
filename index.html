<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZQ HUB | Scripts</title>
    <style>
        :root {
            --primary: #4a148c;
            --accent: #bb86fc;
            --bg: #0a0a0a;
            --card-bg: rgba(18, 18, 18, 0.95);
        }

        body { 
            background-color: var(--bg); 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* حاوية الخلفية المتحركة */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .header { 
            background: linear-gradient(135deg, rgba(74, 20, 140, 0.8) 0%, rgba(10, 10, 10, 0.9) 100%);
            padding: 50px 20px; text-align: center;
            border-bottom: 2px solid var(--primary);
            position: relative;
        }

        .owner-box {
            height: 40px; margin-top: 15px;
            display: flex; justify-content: center; align-items: center;
        }
        #ownerName {
            background: rgba(187, 134, 252, 0.1);
            padding: 5px 20px; border-radius: 20px;
            border: 1px solid var(--accent);
            font-weight: bold; font-size: 0.9rem;
            transition: all 0.8s ease;
        }

        .container { max-width: 1000px; margin: -30px auto 50px; padding: 0 20px; position: relative; z-index: 1; }

        /* الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 25px; border-radius: 15px;
            text-align: center; border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        .stat-card h2 { color: var(--accent); margin: 0; font-size: 1.8rem; }
        .stat-card p { margin: 8px 0 0; font-size: 0.9rem; color: #aaa; }

        /* البحث */
        .search-container { margin-bottom: 40px; }
        #searchInput {
            width: 100%; padding: 18px 25px; border-radius: 35px;
            border: 1px solid var(--primary); background: rgba(21, 21, 21, 0.9);
            color: white; font-size: 1.1rem; outline: none; text-align: center;
            box-shadow: 0 0 25px rgba(74, 20, 140, 0.2);
            transition: 0.3s;
        }
        #searchInput:focus { box-shadow: 0 0 35px rgba(187, 134, 252, 0.4); border-color: var(--accent); }

        /* السكربتات بظهور سموث */
        #scriptsList { display: none; }
        .script-card { 
            background: var(--card-bg); border: 1px solid #333; 
            border-radius: 25px; padding: 30px; margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            transform: translateY(30px); opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }
        .script-card.active { transform: translateY(0); opacity: 1; }

        .key-section {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px; border-radius: 12px;
            margin-bottom: 20px; border: 1px dashed #444;
            display: flex; justify-content: space-between; align-items: center;
        }

        pre { 
            background: #000; padding: 20px; border-radius: 12px; 
            text-align: left; overflow-x: auto; direction: ltr;
            border: 1px solid #222; color: #d1d1d1; font-size: 0.95rem;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }

        .btn-main { 
            flex: 2; background: var(--primary); color: white; padding: 15px; 
            border-radius: 12px; border: none; cursor: pointer; 
            font-weight: bold; font-size: 1.1rem; transition: 0.3s;
        }
        .btn-sec { 
            flex: 1; background: #333; color: white; padding: 15px; 
            border-radius: 12px; border: none; cursor: pointer; 
            font-weight: bold; transition: 0.3s;
        }
        .btn-main:hover { background: #6a1b9a; transform: scale(1.02); }
        .btn-sec:hover { background: #444; }

        /* التنبيه الأخضر */
        #toast {
            visibility: hidden; min-width: 280px; background-color: #4caf50;
            color: white; text-align: center; border-radius: 12px; padding: 16px;
            position: fixed; z-index: 2000; left: 50%; bottom: 40px;
            transform: translateX(-50%); font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #toast.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes slideUp { from {bottom: 0; opacity: 0;} to {bottom: 40px; opacity: 1;} }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div id="toast">تم النسخ بنجاح! ✅</div>

    <div class="header">
        <h1 style="margin:0; font-size: 2.8rem; letter-spacing: 2px;">ZQ HUB | Scripts</h1>
        <p style="margin-top:10px; opacity: 0.8;">بوابتك لأقوى السكربتات الحصرية</p>
        <div class="owner-box">
            <div id="ownerName">BY: astro_lol4</div>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h2>28</h2>
                <p>متصل الآن 👥</p>
            </div>
            <div class="stat-card">
                <h2 style="color: #4caf50;">Safe</h2>
                <p>حماية السكربتات 🛡️</p>
            </div>
            <div class="stat-card">
                <h2>+3,200</h2>
                <p>إجمالي الاستخدام 📈</p>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="searchScript()" placeholder="اكتب اسم السكربت (مثال: Timebomb)...">
        </div>

        <div id="scriptsList">
            <div class="script-card" data-name="timebomb">
                <h2 style="margin-top:0; color: var(--accent);">Timebomb Script</h2>
                <div class="key-section">
                    <div>المفتاح: <span id="keyText" style="color:white; font-family: monospace;">ZQHUB_829376_JSORCQ</span></div>
                    <button class="btn-sec" onclick="copyValue('ZQHUB_829376_JSORCQ', 'تم نسخ المفتاح!')" style="padding: 8px 15px; font-size: 0.8rem;">نسخ الكي</button>
                </div>
                <pre id="code1">loadstring(game:HttpGet("https://pastebin.com/raw/d1Bc8Rax"))()</pre>
                <div class="btn-group">
                    <button class="btn-main" onclick="copyValue(document.getElementById('code1').innerText, 'تم نسخ السكربت!')">نسخ السكربت</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // إعداد الخلفية المتحركة
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#bb86fc" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#4a148c", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "repulse" } }
            }
        });

        // تبديل الأسماء
        const names = ["BY: astro_lol4", "BY: zeenko", "BY: qwaw493"];
        let currentIdx = 0;
        setInterval(() => {
            const el = document.getElementById('ownerName');
            el.style.opacity = 0;
            setTimeout(() => {
                currentIdx = (currentIdx + 1) % names.length;
                el.innerText = names[currentIdx];
                el.style.opacity = 1;
            }, 800);
        }, 4000);

        // البحث مع أنيميشن سموث
        function searchScript() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let list = document.getElementById('scriptsList');
            let cards = document.getElementsByClassName('script-card');
            
            if (input.length > 0) {
                list.style.display = "block";
                for (let card of cards) {
                    if (card.getAttribute('data-name').includes(input)) {
                        setTimeout(() => card.classList.add('active'), 10);
                        card.style.display = "block";
                    } else {
                        card.classList.remove('active');
                        card.style.display = "none";
                    }
                }
            } else {
                list.style.display = "none";
            }
        }

        // وظيفة النسخ الموحدة
        function copyValue(text, message) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById("toast");
                toast.innerText = message + " ✅";
                toast.className = "show";
                setTimeout(() => { toast.className = ""; }, 3000);
            });
        }
    </script>
</body>
</html>
