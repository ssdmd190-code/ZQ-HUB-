<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZQ HUB | السكربتات الرسمية</title>
    <style>
        :root {
            --primary: #4a148c;
            --accent: #bb86fc;
            --bg: #0a0a0a;
            --card-bg: #121212;
        }

        body { 
            background-color: var(--bg); 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; padding: 0;
        }

        .header { 
            background: linear-gradient(135deg, #4a148c 0%, #0a0a0a 100%);
            padding: 40px 20px; text-align: center;
            border-bottom: 2px solid var(--primary);
        }

        /* أنيميشن تبديل الأسماء */
        .owner-box {
            height: 40px; margin-top: 15px;
            display: flex; justify-content: center; align-items: center;
        }
        #ownerName {
            background: rgba(187, 134, 252, 0.1);
            padding: 5px 20px; border-radius: 20px;
            border: 1px solid var(--accent);
            font-weight: bold; font-size: 0.9rem;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .container { max-width: 1000px; margin: -30px auto 50px; padding: 0 20px; }

        /* الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px; border-radius: 15px;
            text-align: center; border: 1px solid #222;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .stat-card h2 { color: var(--accent); margin: 0; font-size: 1.8rem; }
        .stat-card p { margin: 5px 0 0; font-size: 0.85rem; color: #888; }

        /* شريط البحث */
        .search-container { margin-bottom: 30px; }
        #searchInput {
            width: 100%; padding: 15px 25px; border-radius: 30px;
            border: 1px solid var(--primary); background: #151515;
            color: white; font-size: 1rem; outline: none; text-align: center;
            box-shadow: 0 5px 15px rgba(74, 20, 140, 0.3);
        }

        /* قائمة السكربتات (مخفية) */
        #scriptsList { display: none; }
        .script-card { 
            background: var(--card-bg); border: 1px solid #222; 
            border-radius: 20px; padding: 25px; margin-bottom: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }
        .key-info { background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 15px; border-right: 4px solid var(--accent); }

        pre { 
            background: #000; padding: 15px; border-radius: 10px; 
            text-align: left; overflow-x: auto; direction: ltr;
            border: 1px solid #1a1a1a; color: #ccc; font-size: 0.9rem;
        }

        .btn-copy { 
            background: var(--primary); color: white; padding: 12px; 
            border-radius: 12px; border: none; cursor: pointer; 
            font-weight: bold; width: 100%; font-size: 1rem; transition: 0.3s;
        }
        .btn-copy:hover { background: #6a1b9a; transform: scale(1.01); }

        /* التنبيه الأخضر */
        #toast {
            visibility: hidden; min-width: 250px; background-color: #4caf50;
            color: white; text-align: center; border-radius: 10px; padding: 14px;
            position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold;
        }
        #toast.show { visibility: visible; animation: slideUp 0.5s, fadeOut 0.5s 2.5s; }
        @keyframes slideUp { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeOut { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body>

    <div id="toast">تم النسخ بنجاح! ✅</div>

    <div class="header">
        <h1 style="margin:0;">ZQ HUB | Scripts</h1>
        <p>ابحث عن السكربت المفضل لديك</p>
        <div class="owner-box">
            <div id="ownerName">BY: astro_lol4</div>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h2>28</h2>
                <p>متصل الآن 👥</p>
            </div>
            <div class="stat-card">
                <h2 style="color: #4caf50;">Safe</h2>
                <p>حماية السكربتات 🛡️</p>
            </div>
            <div class="stat-card">
                <h2>3,200+</h2>
                <p>إحصائيات الاستخدام 📈</p>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="searchScript()" placeholder="اكتب اسم السكربت هنا (مثال: Timebomb)...">
        </div>

        <div id="scriptsList">
            <div class="script-card" data-name="timebomb">
                <h2 style="margin-top:0;">Timebomb Script</h2>
                <div class="key-info">المفتاح: <span style="color:var(--accent); font-weight:bold;">ZQ_OFFICIAL_829</span></div>
                <pre id="code1">loadstring(game:HttpGet("https://pastebin.com/raw/d1Bc8Rax"))()</pre>
                <button class="btn-copy" style="margin-top:15px;" onclick="copyCode('code1')">نسخ السكربت</button>
            </div>
        </div>
    </div>

    <script>
        // نظام تبديل الأسماء بالأنيميشن
        const names = ["BY: astro_lol4", "BY: zeenko", "BY: qwaw493"];
        let currentIdx = 0;
        const ownerEl = document.getElementById('ownerName');

        function rotateNames() {
            ownerEl.style.opacity = 0;
            ownerEl.style.transform = "translateY(10px)";
            
            setTimeout(() => {
                currentIdx = (currentIdx + 1) % names.length;
                ownerEl.innerText = names[currentIdx];
                ownerEl.style.opacity = 1;
                ownerEl.style.transform = "translateY(0)";
            }, 800);
        }
        setInterval(rotateNames, 4000);

        // وظيفة البحث
        function searchScript() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let list = document.getElementById('scriptsList');
            let cards = document.getElementsByClassName('script-card');
            
            if (input.length > 0) {
                list.style.display = "block";
                for (let card of cards) {
                    let name = card.getAttribute('data-name');
                    card.style.display = name.includes(input) ? "block" : "none";
                }
            } else {
                list.style.display = "none";
            }
        }

        // وظيفة النسخ
        function copyCode(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById("toast");
                toast.className = "show";
                setTimeout(() => { toast.className = ""; }, 3000);
            });
        }
    </script>
</body>
</html>
