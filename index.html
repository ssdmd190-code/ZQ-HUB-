<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZQ HUB | Official Scripts</title>
    <style>
        :root {
            --primary: #6a1b9a;
            --accent: #bb86fc;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --code-bg: #000000;
        }
        body { 
            background-color: var(--bg); 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 0;
        }
        .header { 
            background: var(--primary); 
            padding: 35px; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(106, 27, 154, 0.4);
            border-bottom: 2px solid var(--accent);
        }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        
        /* حل مشكلة اهتزاز الأسماء */
        .creators-section {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px; /* مسافة ثابتة بين By والاسم */
        }
        .by-static { color: #ffffff; }
        .name-container {
            display: inline-block;
            min-width: 120px; /* عرض ثابت لمنع دفع الكلمة */
            text-align: right;
        }
        .fade-text {
            transition: opacity 0.5s ease-in-out;
            color: var(--accent);
        }

        /* البحث */
        .search-container { margin-bottom: 30px; }
        #searchInput {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            background: #1a1a1a;
            color: white;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* إخفاء السكربتات افتراضياً */
        .script-item { display: none; }

        .card { 
            background: var(--card-bg); 
            border: 1px solid #333; 
            border-radius: 20px; 
            padding: 30px; 
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            transition: 0.4s;
        }
        .card:hover { transform: translateY(-5px); }

        .key-container {
            background: #252525;
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            border-right: 5px solid var(--accent);
        }
        .key { color: var(--accent); font-weight: bold; }

        pre { 
            background: var(--code-bg); 
            padding: 20px; 
            border-radius: 12px; 
            text-align: left; 
            overflow-x: auto; 
            direction: ltr;
            color: #d4d4d4;
        }

        .btn { 
            background: var(--primary); 
            color: white; 
            padding: 12px 30px; 
            border-radius: 12px; 
            border: none;
            cursor: pointer; 
            font-weight: bold;
        }

        .discord-section {
            background: #23272a;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 60px;
            border-left: 6px solid #7289da;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ZQ HUB | Scripts</h1>
        <p>أفضل السكربتات لسيرفرنا الخاص</p>
    </div>

    <div class="container">
        
        <!-- قسم المطورين المحدث لمنع الاهتزاز -->
        <div class="creators-section">
            <span class="by-static">By:</span>
            <div class="name-container">
                <span id="creator" class="fade-text">qwaw493</span>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="searchFunction()" placeholder="ابحث عن اسم السكربت لتظهره...">
        </div>

        <div id="scriptsList">
            <!-- Timebomb -->
            <div class="card script-item">
                <h2 class="script-name">Timebomb Script</h2>
                <div class="key-container">
                    <span>المفتاح: <span class="key">ZQHUB_829376_JSORCQ</span></span>
                </div>
                <pre id="code1">loadstring(game:HttpGet("https://pastebin.com/raw/d1Bc8Rax"))()</pre>
                <button class="btn" onclick="copy('code1')">نسخ السكربت</button>
            </div>

            <!-- Aimbot -->
            <div class="card script-item">
                <h2 class="script-name">Aimbot Script (Official)</h2>
                <div class="key-container">
                    <span>المفتاح: <span class="key">ZQHUB_AIM_SMOOTH</span></span>
                </div>
                <pre id="code2">-- ZQ HUB Aimbot Loaded!</pre>
                <button class="btn" onclick="copy('code2')">نسخ السكربت</button>
            </div>
        </div>

        <div class="discord-section">
            <div style="display:flex; align-items:center;">
                <img src="https://assets-global.website-files.com/6257adef93867e3d0358864f/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" width="50" style="margin-left:15px;">
                <div>
                    <h3 style="margin:0;">انضم إلى سيرفرنا</h3>
                </div>
            </div>
            <a href="https://discord.gg/YRYNjMQWu" target="_blank" class="btn" style="background:#7289da; text-decoration:none;">دخول السيرفر</a>
        </div>
    </div>

    <script>
        // تبديل أسماء المطورين الأربعة
        const creators = ["qwaw493", "zennko", "astro_lol4", "s1133bj3"];
        let currentIdx = 0;
        const creatorEl = document.getElementById("creator");

        setInterval(() => {
            creatorEl.style.opacity = 0;
            setTimeout(() => {
                currentIdx = (currentIdx + 1) % creators.length;
                creatorEl.innerText = creators[currentIdx];
                creatorEl.style.opacity = 1;
            }, 500);
        }, 3000);

        // وظيفة البحث: لا تظهر السكربتات إلا عند البحث
        function searchFunction() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let items = document.getElementsByClassName('script-item');
            
            for (let i = 0; i < items.length; i++) {
                let name = items[i].getElementsByClassName('script-name')[0].innerText.toLowerCase();
                
                // إذا كان مربع البحث فارغاً، أخفِ كل شيء. إذا كتب المستخدم شيئاً، أظهر المطابق فقط.
                if (input.trim() === "") {
                    items[i].style.display = "none";
                } else if (name.includes(input)) {
                    items[i].style.display = "block";
                } else {
                    items[i].style.display = "none";
                }
            }
        }

        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("✅ تم النسخ!");
        }
    </script>
</body>
</html>
