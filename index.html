<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZQ HUB - Scripts Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Noto+Kufi+Arabic:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           🎨 تنسيقات الـ CSS (هوية ZQ HUB البنفسجية والمظلمة)
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0e; /* الخلفية الداكنة العميقة */
            color: #ffffff;
            font-family: 'Montserrat', 'Noto Kufi Arabic', sans-serif;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 950px;
        }

        /* 📦 بطاقة السكربت الرئيسية المطابقة تماماً لتصميمك */
        .script-card {
            background-color: #111115; /* لون الحاوية الداخلي */
            border-radius: 20px; /* الحواف الدائرية الكبيرة الاحترافية */
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 🔝 جزء الهيدر (ترتيب النص ليكون اسم المطور باليسار واسم السكربت باليمين) */
        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding-bottom: 5px;
        }

        /* 👑 تاغ المطور المطلوب بجانب السكربت (بالجه اليسرى) */
        .developer-tag {
            font-size: 22px;
            font-weight: 700;
            color: #bd24ff; /* اللون البنفسجي المضيء لـ ZQ HUB */
            letter-spacing: 0.5px;
        }

        /* 📝 اسم السكربت (بالجهة اليمنى) */
        .script-title {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        /* 🔐 حاوية الكي (المفتاح) مع زر النسخ الصغير */
        .key-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: transparent;
            border: 1px dashed rgba(255, 255, 255, 0.1); /* الإطار المقطع الخفيف المحيط بالكي */
            padding: 15px 20px;
            border-radius: 12px;
            width: 100%;
        }

        .key-info {
            font-size: 15px;
            color: #e1e1e6;
            direction: ltr; /* لترتيب النص الإنجليزي بشكل صحيح */
        }

        .key-text {
            color: #ffffff;
            font-weight: 600;
            font-family: monospace;
            margin-left: 5px;
        }

        /* 🔘 زر نسخ الكي الصغير */
        .btn-copy-small {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #ffffff;
            padding: 6px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Montserrat', 'Noto Kufi Arabic', sans-serif;
            transition: all 0.2s ease;
        }

        .btn-copy-small:hover {
            background-color: #ffffff;
            color: #111115;
            border-color: #ffffff;
        }

        /* 💻 صندوق عرض كود الـ loadstring الأسود */
        .code-box {
            background-color: #050507; /* اللون الأسود الكامل المخفي في الداخل */
            padding: 18px 20px;
            border-radius: 10px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.02);
            width: 100%;
            text-align: left; /* جعل الكود يبدأ من اليسار */
        }

        .code-box code {
            font-family: 'Courier New', Courier, monospace;
            color: #e1e1e6;
            font-size: 14px;
            white-space: nowrap;
        }

        /* 🚀 الزر البنفسجي العريض السفلي لنسخ السكربت بالكامل */
        .btn-main-copy {
            background-color: #561ab3; /* البنفسجي الغامق المتناسق مع تصميمك الحالي */
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-family: 'Noto Kufi Arabic', 'Montserrat', sans-serif;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 4px 15px rgba(86, 26, 179, 0.2);
        }

        .btn-main-copy:hover {
            background-color: #6a24dc;
            box-shadow: 0 6px 20px rgba(106, 36, 220, 0.4);
            transform: translateY(-1px);
        }

        /* نوتفكيشن إشعار النسخ */
        .toast-notification {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #561ab3;
            color: #ffffff;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: bottom 0.4s ease;
            z-index: 1000;
        }

        .toast-notification.show {
            bottom: 30px;
        }

        /*📱 التوافق مع شاشات الجوال */
        @media (max-width: 650px) {
            .script-header {
                flex-direction: column-reverse;
                align-items: flex-start;
                gap: 10px;
            }
            .key-container {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .btn-copy-small {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="script-card">
            
            <div class="script-header">
                <span class="developer-tag">Timebomb Script</span>
                <h2 class="script-title">Made by Zenko</h2>
            </div>
            
            <div class="key-container">
                <button class="btn-copy-small" onclick="copyText('zqh_829376_jsorcq', 'تم نسخ الكي بنجاح!')">نسخ / Copy</button>
                <div class="key-info">
                    Key: <span class="key-text">zqh_829376_jsorcq</span> / الكي
                </div>
            </div>
            
            <div class="code-box">
                <code>loadstring(game:HttpGet("https://pastebin.com/raw/d1Bc8Rax"))()</code>
            </div>
            
            <button class="btn-main-copy" onclick="copyText('loadstring(game:HttpGet(\'https://pastebin.com/raw/d1Bc8Rax\'))()', 'تم نسخ السكربت بنجاح!')">
                نسخ السكربت / Copy Script
            </button>
            
        </div>
        
    </div>

    <div id="toast" class="toast-notification">تم النسخ بنجاح!</div>

    <script>
        function copyText(textToCopy, successMessage) {
            navigator.clipboard.writeText(textToCopy).then(() => {
                const toast = document.getElementById("toast");
                toast.innerText = successMessage;
                toast.classList.add("show");
                
                // إخفاء الإشعار بعد 3 ثوانٍ تلقائياً
                setTimeout(() => {
                    toast.classList.remove("show");
                }, 3000);
            }).catch(err => {
                console.error('خطأ أثناء المحاولة: ', err);
            });
        }
    </script>
</body>
</html>
